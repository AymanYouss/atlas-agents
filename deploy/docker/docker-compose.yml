# Full local stack: Postgres + API + frontend.
# Build the sandbox image once (make sandbox-image) so code_exec works.
#   docker compose -f deploy/docker/docker-compose.yml up --build
name: atlas

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ATLAS_ENV: production
      ATLAS_DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlas
      ATLAS_CORS_ORIGINS: http://localhost:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ATLAS_SANDBOX_IMAGE: atlas-sandbox:latest
    ports:
      - "8000:8000"
    # Mount the Docker socket so the API can launch sandbox containers.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        VITE_API_BASE: ""
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  atlas_pgdata:
