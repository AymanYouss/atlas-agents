apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-frontend
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/aymanyouss/atlas-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-frontend
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-frontend
spec:
  selector:
    app.kubernetes.io/name: atlas-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
