apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: atlas
resources:
  - namespace.yaml
  - config.yaml
  - postgres.yaml
  - api.yaml
  - frontend.yaml
  - ingress.yaml
  - networkpolicy.yaml

images:
  - name: ghcr.io/aymanyouss/atlas-api
    newTag: latest
  - name: ghcr.io/aymanyouss/atlas-frontend
    newTag: latest
