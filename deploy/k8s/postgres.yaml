# Self-hosted Postgres for clusters without a managed database. For production on
# AWS, prefer RDS (deploy/aws/rds.tf) and point ATLAS_DATABASE_URL at it instead.
apiVersion: v1
kind: Service
metadata:
  name: atlas-postgres
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: atlas-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlas-postgres
  namespace: atlas
spec:
  serviceName: atlas-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: atlas
            - name: POSTGRES_DB
              value: atlas
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "atlas"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
