name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint · types · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check atlas tests
          ruff format --check atlas tests

      - name: Mypy (type check)
        run: mypy atlas

      - name: Pytest (unit, with coverage)
        run: pytest -m "not integration and not eval" --cov=atlas --cov-report=xml --cov-report=term-missing
