name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint · types · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check atlas tests
          ruff format --check atlas tests

      - name: Mypy (type check)
        run: mypy atlas

      - name: Pytest (unit, with coverage)
        run: pytest -m "not integration and not eval" --cov=atlas --cov-report=xml --cov-report=term-missing

  frontend:
    name: frontend (typecheck · lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  docker:
    name: docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: atlas-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.sandbox
          push: false
          tags: atlas-sandbox:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.frontend
          push: false
          tags: atlas-frontend:ci
